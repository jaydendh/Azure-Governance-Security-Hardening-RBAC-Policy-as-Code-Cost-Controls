<svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0078D4"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D13438"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#605E5C"/>
    </marker>
  </defs>

  <rect width="1000" height="680" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1B1F3B">Azure Governance &amp; Security Hardening</text>

  <!-- Admin box -->
  <rect x="380" y="55" width="240" height="60" rx="6" fill="#0078D4" stroke="#005A9E" stroke-width="1.5"/>
  <text x="500" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Admin (You)</text>
  <text x="500" y="98" text-anchor="middle" font-size="12" fill="#E5F1FB">Owner Role - Subscription</text>

  <!-- Arrow Admin -> RG -->
  <line x1="500" y1="115" x2="500" y2="155" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="515" y="138" font-size="11" fill="#0078D4">applies RBAC, Policy &amp; Budget</text>

  <!-- Resource Group container -->
  <rect x="190" y="160" width="620" height="250" rx="8" fill="#F3F2F1" stroke="#0078D4" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="500" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B1F3B">Resource Group: rg-lab05-gov-[yourname]  (East US)</text>

  <!-- Governance control cards inside RG -->
  <rect x="215" y="205" width="170" height="85" rx="6" fill="#FFFFFF" stroke="#605E5C" stroke-width="1"/>
  <text x="300" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B1F3B">RBAC</text>
  <text x="300" y="243" text-anchor="middle" font-size="10.5" fill="#323130">Role: Reader</text>
  <text x="300" y="258" text-anchor="middle" font-size="10.5" fill="#323130">Assigned to:</text>
  <text x="300" y="273" text-anchor="middle" font-size="10.5" fill="#323130">junior-dev-[yourname]</text>

  <rect x="415" y="205" width="170" height="85" rx="6" fill="#FFFFFF" stroke="#605E5C" stroke-width="1"/>
  <text x="500" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B1F3B">Azure Policy</text>
  <text x="500" y="243" text-anchor="middle" font-size="10.5" fill="#323130">Restrict-VM-Sizes</text>
  <text x="500" y="258" text-anchor="middle" font-size="10.5" fill="#323130">Allowed SKUs only:</text>
  <text x="500" y="273" text-anchor="middle" font-size="10.5" fill="#323130">Standard_B1s / B1ms</text>

  <rect x="615" y="205" width="170" height="85" rx="6" fill="#FFFFFF" stroke="#605E5C" stroke-width="1"/>
  <text x="700" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B1F3B">Cost Budget</text>
  <text x="700" y="243" text-anchor="middle" font-size="10.5" fill="#323130">Monthly-Lab-Budget</text>
  <text x="700" y="258" text-anchor="middle" font-size="10.5" fill="#323130">Amount: $50 / month</text>
  <text x="700" y="273" text-anchor="middle" font-size="10.5" fill="#323130">Alert @ 80% actual</text>

  <!-- protected resources inside RG -->
  <rect x="320" y="320" width="360" height="65" rx="6" fill="#E5F1FB" stroke="#0078D4" stroke-width="1"/>
  <text x="500" y="343" text-anchor="middle" font-size="11.5" fill="#1B1F3B">Protected Resources</text>
  <text x="500" y="360" text-anchor="middle" font-size="10.5" fill="#323130">(VMs, Storage Accounts, etc. governed by the controls above)</text>

  <!-- Junior Dev actor -->
  <rect x="40" y="470" width="200" height="60" rx="6" fill="#FFFFFF" stroke="#1B1F3B" stroke-width="1.5"/>
  <text x="140" y="494" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B1F3B">Junior Developer</text>
  <text x="140" y="512" text-anchor="middle" font-size="11" fill="#323130">junior-dev-[yourname]</text>

  <!-- Junior Dev attempt arrow -->
  <line x1="160" y1="470" x2="280" y2="385" stroke="#605E5C" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="100" y="430" font-size="10.5" fill="#605E5C">attempts: create</text>
  <text x="100" y="443" font-size="10.5" fill="#605E5C">Storage Account</text>

  <!-- Blocked return arrow for junior dev -->
  <line x1="225" y1="392" x2="120" y2="467" stroke="#D13438" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="-10" y="455" font-size="10.5" fill="#D13438" transform="rotate(0)"></text>
  <text x="10" y="465" font-size="10.5" fill="#D13438">403 Access Denied</text>
  <text x="10" y="478" font-size="10.5" fill="#D13438">(Reader only)</text>

  <!-- Admin oversized VM test actor -->
  <rect x="760" y="470" width="200" height="60" rx="6" fill="#FFFFFF" stroke="#1B1F3B" stroke-width="1.5"/>
  <text x="860" y="494" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B1F3B">Policy Test</text>
  <text x="860" y="512" text-anchor="middle" font-size="11" fill="#323130">vm-policy-test (D2s_v3)</text>

  <!-- Test attempt arrow -->
  <line x1="840" y1="470" x2="720" y2="385" stroke="#605E5C" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="765" y="412" text-anchor="end" font-size="10.5" fill="#605E5C">attempts: create</text>
  <text x="765" y="425" text-anchor="end" font-size="10.5" fill="#605E5C">oversized VM</text>

  <!-- Blocked return arrow for policy test -->
  <line x1="775" y1="392" x2="880" y2="467" stroke="#D13438" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="860" y="548" text-anchor="middle" font-size="10.5" fill="#D13438">Validation Failed</text>
  <text x="860" y="561" text-anchor="middle" font-size="10.5" fill="#D13438">(Policy restriction)</text>

  <!-- Budget alert flow -->
  <line x1="700" y1="290" x2="700" y2="430" stroke="#FFB900" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <rect x="600" y="430" width="200" height="50" rx="6" fill="#FFF8E5" stroke="#FFB900" stroke-width="1.5"/>
  <text x="700" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#7A5B00">Budget Alert Fired</text>
  <text x="700" y="466" text-anchor="middle" font-size="10" fill="#7A5B00">Email sent to Admin @ 80% spend</text>

  <!-- Legend -->
  <line x1="190" y1="610" x2="220" y2="610" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="228" y="614" font-size="10.5" fill="#323130">Governance control applied</text>
  <line x1="190" y1="630" x2="220" y2="630" stroke="#605E5C" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="228" y="634" font-size="10.5" fill="#323130">Attempted action</text>
  <line x1="500" y1="610" x2="530" y2="610" stroke="#D13438" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="538" y="614" font-size="10.5" fill="#323130">Blocked by control</text>
  <line x1="500" y1="630" x2="530" y2="630" stroke="#FFB900" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="538" y="634" font-size="10.5" fill="#323130">Monitoring / alerting</text>
</svg>
